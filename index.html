<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="Steamの圧倒的に好評なゲームをレビュー数順に探すランキングアプリ">
  <title>STEAM / OVW — 圧倒的に好評ランキング</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#top" aria-label="ページ上部へ">STEAM <span>/ OVW</span></a>
    <div class="topbar-meta">
      <span class="live-dot" aria-hidden="true"></span>
      <span id="sourceLabel">接続準備中</span>
    </div>
  </header>

  <main id="top">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">OVERWHELMINGLY POSITIVE / REVIEW COUNT</p>
      <h1 id="page-title">圧倒的に好評。<br><span>レビュー数順。</span></h1>
      <div class="hero-foot">
        <p>Steamで「圧倒的に好評」のゲームだけを抽出。<br>人気の厚みを、レビュー数で比較する。</p>
        <button class="primary-button" id="reloadButton" type="button">
          <span>データ更新</span><span aria-hidden="true">↻</span>
        </button>
      </div>
    </section>

    <section class="control-panel" aria-label="絞り込み条件">
      <label class="search-field">
        <span>キーワード</span>
        <input id="searchInput" type="search" placeholder="ゲーム名を入力" autocomplete="off">
      </label>
      <label>
        <span>最低レビュー数</span>
        <select id="minimumSelect">
          <option value="0">指定なし</option>
          <option value="10000">1万件以上</option>
          <option value="50000">5万件以上</option>
          <option value="100000">10万件以上</option>
          <option value="500000">50万件以上</option>
        </select>
      </label>
      <label>
        <span>並び順</span>
        <select id="sortSelect">
          <option value="reviews">レビュー数が多い順</option>
          <option value="score">高評価率が高い順</option>
          <option value="name">タイトル順</option>
        </select>
      </label>
      <label>
        <span>取得件数</span>
        <select id="limitSelect">
          <option value="25">25件</option>
          <option value="50">50件</option>
          <option value="100" selected>100件</option>
          <option value="200">200件</option>
        </select>
      </label>
    </section>

    <section class="ranking" aria-labelledby="ranking-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">THE RANKING</p>
          <h2 id="ranking-title">ランキング</h2>
        </div>
        <div class="section-actions">
          <p><strong id="resultCount">—</strong> TITLES</p>
          <button class="text-button" id="csvButton" type="button">CSV保存 ↓</button>
        </div>
      </div>

      <div class="table-head" aria-hidden="true">
        <span>順位 / タイトル</span><span>高評価率</span><span>レビュー数</span><span>価格</span><span></span>
      </div>
      <div id="gameList" class="game-list" aria-live="polite" aria-busy="true"></div>
      <div id="emptyState" class="empty-state" hidden>
        <strong>NO RESULTS.</strong>
        <span>条件に合うゲームがありません。</span>
      </div>
    </section>
  </main>

  <footer>
    <strong>STEAM / OVW</strong>
    <p>非公式ツールです。評価・価格は取得時点の情報です。</p>
    <span>v1.0.0</span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
